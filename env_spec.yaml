nexastack:
  topology: default

incident:
  difficulty_distribution:
    easy: 0.3
    medium: 0.4
    hard: 0.3

reward:
  weights:
    r1_root_cause: 0.35
    r2_mttr: 0.30
    r3_recovery_quality: 0.25
    r4_blast_radius: 0.10

observability:
  black_box_services:
    - payment-vault
    - fraud-detector
  alert_threshold_multiplier: 1.5

training:
  max_steps_per_episode: 50
  sla_breach_threshold_steps: 50
  placeholder_action:
    agent: holmes
    category: investigative
    name: QueryLogs
    params:
      service: cart-service
      time_range: [0, 60]

demo:
  seed: 42
