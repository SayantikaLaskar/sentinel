# ============================================================
# SENTINEL — OpenEnv Hackathon Manifest
# Meta PyTorch OpenEnv Hackathon 2026
# https://github.com/meta-pytorch/OpenEnv
# ============================================================

name: sentinel
version: "1.0.0"
description: >
  SENTINEL is a multi-agent reinforcement learning environment for autonomous
  cloud-infrastructure incident response. Five specialized LLM agents
  (Argus, Holmes, Forge, Hermes, Oracle) collaborate to diagnose and
  remediate cascading failures across a 30-service microservice topology
  (NexaStack) using GRPO-trained policies with a 4-dimensional RLVR reward.

authors:
  - name: "SENTINEL Team"
    email: ""

license: MIT

# -----------------------------------------------------------
# Gymnasium registration
# -----------------------------------------------------------
entry_point: sentinel.env:Sentinel_Env
gym_id: "Sentinel-v1"
gym_kwargs:
  config_path: env_spec.yaml
  incident_library_path: incident_library.yaml
  render_mode: human

# -----------------------------------------------------------
# Environment specification
# -----------------------------------------------------------
environment:
  type: multi_agent
  observation_space: dict
  action_space: dict
  max_episode_steps: 200
  reward_threshold: 0.70          # total reward target for "solved"
  is_parallelizable: true
  render_modes:
    - human
    - json

  agents:
    - id: argus
      role: "Metric monitor — investigative + meta actions"
    - id: holmes
      role: "Root-cause analyst — investigative actions only"
    - id: forge
      role: "Remediation executor — remediation actions only"
    - id: hermes
      role: "Deployment controller — deployment + meta actions"
    - id: oracle
      role: "Self-improvement coordinator — meta actions only"

  observation_keys:
    - metrics_snapshot       # partial-view service metrics (black-box for 2 services)
    - causal_graph_snapshot  # 30×30 weighted adjacency matrix (flattened float32)
    - active_alerts          # JSON list of Alert objects
    - recent_logs            # JSON list of LogEntry objects (with missing_log_ratio noise)
    - active_traces          # JSON list of Trace objects
    - incident_context       # Hypothesis tree + timeline + blast radius
    - sla_state              # Per-service SLA breach flags

  action_schema:
    agent:    "argus | holmes | forge | hermes | oracle"
    category: "investigative | remediation | deployment | meta"
    name:     "QueryLogs | QueryMetrics | QueryTrace | FormHypothesis | RestartService | ScaleService | ModifyConfig | RollbackDeployment | DrainTraffic | ModifyRateLimit | CanaryDeploy | FullDeploy | Rollback | GenerateNewScenario | EscalateToHuman | CloseIncident"
    params:   "{}"

# -----------------------------------------------------------
# Reward design
# -----------------------------------------------------------
reward:
  type: shaped_rlvr
  components:
    R1:
      name: root_cause_accuracy
      weight: 0.35
      description: "1.0 if service+failure_type match; 0.5 if service only; 0.0 otherwise"
    R2:
      name: mttr_score
      weight: 0.30
      description: "1 / (1 + steps / sla_threshold) + 0.1 pre-SLA bonus"
    R3:
      name: recovery_quality
      weight: 0.25
      description: "Fraction of services within 5% of baseline metrics"
    R4:
      name: blast_radius_minimization
      weight: 0.10
      description: "1 - (current_blast_radius / peak_blast_radius)"
  step_penalties:
    blast_expansion: -1.0
    healthy_restart: -1.0
    late_resolution: -0.5   # applied when MTTR > 2 × sla_threshold

# -----------------------------------------------------------
# Training algorithm
# -----------------------------------------------------------
training:
  algorithm: REINFORCE_EMA
  base_model: "unsloth/Qwen2.5-7B-Instruct-bnb-4bit"
  quantization: 4bit_bnb
  lora:
    r: 16
    alpha: 32
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
  batch_size: 2
  max_steps: 1000
  hosted_gpu: "NVIDIA L40S (48GB)"
  note: "Training uses REINFORCE with EMA baseline on Qwen2.5-7B-Instruct-bnb-4bit. All 5 agents trained for 100 episodes each."

# -----------------------------------------------------------
# Scenario library
# -----------------------------------------------------------
scenarios:
  library: incident_library.yaml
  difficulty_distribution:
    easy:   0.30
    medium: 0.40
    hard:   0.30
  failure_types:
    - memory_leak
    - connection_pool_exhaustion
    - cpu_spike
    - bad_deployment
    - cache_miss_storm
    - network_partition

# -----------------------------------------------------------
# Dependencies
# -----------------------------------------------------------
dependencies:
  python: ">=3.10"
  install: pip install -r requirements.txt
  optional_gpu:
    - unsloth
    - trl
    - datasets

# -----------------------------------------------------------
# Quick start
# -----------------------------------------------------------
quickstart: |
  git clone <repo_url> && cd sentinel
  pip install -r requirements.txt
  python -c "
  from sentinel.env import Sentinel_Env
  env = Sentinel_Env()
  obs, info = env.reset()
  print('Incident injected:', info['incident_id'])
  print(env.render())
  "
  # Or open the Colab notebook:
  # sentinel_colab_demo.ipynb

# -----------------------------------------------------------
# Submission metadata
# -----------------------------------------------------------
submission:
  hackathon: "Meta PyTorch OpenEnv Hackathon 2026"
  track: "World Modeling / Long-Horizon Planning"
  colab_notebook: "sentinel_colab_training.ipynb"
  blog_post: "blog/huggingface_post.md"
  video_script: "blog/youtube_script.md"
  results_dir: "results/"
  docker: "docker build -t sentinel . && docker run -p 7860:7860 sentinel"
